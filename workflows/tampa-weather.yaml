direktiv_api: workflow/v1

description: >
  Tampa weather JSON — delegates to get-weather-json with location_query Tampa.

functions:
  - id: get-weather-json
    workflow: /workflows/get-weather-json.yaml
    type: subflow

states:
  - id: default-location
    type: noop
    transform: 'jq({ location_query: "Tampa" })'
    transition: run-json

  - id: run-json
    type: action
    action:
      function: get-weather-json
      input: jq(.)
    transform: jq(.return)
